services:
  ceph:
    image: quay.io/ceph/demo:latest-reef
    container_name: ceph-demo
    # Host networking is required for the dashboard (localhost:8443) and RGW (localhost:8080) to be
    # reachable from the runner without port mapping; --privileged is required by ceph-volume to set
    # up the OSD backing store. Only used in CI (amd64 ubuntu-latest); the OSD does not come up on an
    # arm64 host, which is why this suite is skipped on a dev's arm64 Mac.
    network_mode: host
    privileged: true
    environment:
      MON_IP: 127.0.0.1
      CEPH_PUBLIC_NETWORK: 0.0.0.0/0
      DEMO_DAEMONS: "osd mds rgw"
      CEPH_DEMO_UID: demo
      CEPH_DEMO_ACCESS_KEY: demo
      CEPH_DEMO_SECRET_KEY: demo
      CEPH_DEMO_BUCKET: demo-bucket
